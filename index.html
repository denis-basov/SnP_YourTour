<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <div class="container">
      <!-- <HEADER> -->
      <header class="header">
        <div class="header__top">
          <div class="header__logo">
            <img src="images/YourTour.svg" alt="Логотип YourTour" class="header__logo-image" />
          </div>

          <nav class="header__nav nav">
            <ul class="nav__list p-normal">
              <li class="nav__item">
                <a href="#" class="nav__link">Туры</a>
              </li>
              <li class="nav__item">
                <a href="#" class="nav__link">Создать тур</a>
              </li>
              <li class="nav__item">
                <a href="#" class="nav__link">Отзывы</a>
              </li>
              <li class="nav__item">
                <a href="#" class="nav__link">Истории</a>
              </li>
            </ul>
          </nav>

          <div class="header__contact p-normal">
            <span class="header__phone">+7 999 999 99 99</span>
          </div>
        </div>

        <div class="header__hero hero">
          <div class="hero__content">
            <h1 class="hero__title h1">Идеальные путешествия существуют</h1>
            <p class="hero__subtitle p-normal">Идейные соображения высшего порядка, а также рамки и место обучения кадров</p>
            <button class="hero__button button p-small">Найти тур</button>
          </div>
        </div>
      </header>
      <!-- </HEADER> -->
      <main></main>
      <footer></footer>
    </div>
  </body>
</html>
